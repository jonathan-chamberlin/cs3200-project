{% extends 'base.html' %}

{% block content %}
<h2 class="mt-4 mb-4">Manage Users</h2>

<div class="card">
    <div class="card-body">
        <table class="table table-hover table-sm">
            <thead class="table-success">
                <tr>
                    <th>Name</th>
                    <th>Email</th>
                    <th>Phone</th>
                    <th>Update Email</th>
                </tr>
            </thead>
            <tbody>
            {% for u in users %}
                <tr>
                    <td>{{ u.first_name }} {{ u.last_name }}</td>
                    <td>{{ u.email }}</td>
                    <td>{{ u.phone or '—' }}</td>
                    <td>
                        <form method="POST" action="/update-email/{{ u.id }}"
                              class="d-inline-flex align-items-center gap-1">
                            <input type="email" name="new_email" value="{{ u.email }}"
                                   class="form-control form-control-sm" style="width:220px;" required>
                            <button type="submit" class="btn btn-sm btn-outline-primary"
                                    title="Update email">Save</button>
                        </form>
                    </td>
                </tr>
            {% endfor %}
            </tbody>
        </table>
    </div>
</div>

<div class="mt-3">
    <a href="/register" class="btn btn-success">Register New User</a>
</div>
{% endblock %}
