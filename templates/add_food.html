{% extends 'base.html' %}

{% block content %}
<h2 class="mt-4 mb-4">Add Food Item</h2>

<div class="row justify-content-center">
    <div class="col-md-7">
        <div class="card">
            <div class="card-body">
                <form method="POST" action="/add-food">
                    <div class="mb-3">
                        <label class="form-label">Food Name</label>
                        <input type="text" name="food_name" class="form-control"
                               placeholder="e.g. Blueberries" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Category</label>
                        <select name="category_id" class="form-select" required>
                            <option value="">-- Select Category --</option>
                            {% for c in categories %}
                            <option value="{{ c.id }}">{{ c.category_name }}</option>
                            {% endfor %}
                        </select>
                    </div>
                    <button type="submit" class="btn btn-success w-100">Add Food Item</button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
